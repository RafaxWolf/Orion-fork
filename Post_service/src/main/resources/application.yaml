spring:
  application:
    name: post-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect


server:
  port: 9091

eureka:
  client:
    service-url:
      ## si el servicio esta en este mismo pc usar localhost
      defaultZone: http://localhost:8761/eureka/
  instance:
    #envia la ip real del microservicio a eureka en lugar del nombre
    # de su computador
    prefer-ip-address: true
